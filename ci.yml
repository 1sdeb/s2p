name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check s2p
      - name: Smoke test (no API key required)
        run: |
          python -c "import s2p, s2p.cli, s2p.pipeline, s2p.analyzer, s2p.planner; print('imports ok')"
          python -m compileall -q s2p
